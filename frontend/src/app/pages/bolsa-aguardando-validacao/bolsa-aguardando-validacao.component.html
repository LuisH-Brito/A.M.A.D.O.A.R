<div class="pagina">
  <div class="centralizando">
    <h2 class="titulo">Validação das bolsas</h2>

    <div class="lista-container">
      <div class="lista-scroll">
        @for (bolsa of bolsas; track bolsa.id) {
          <div class="usuario-card">
            <div class="info">
              ID: {{ bolsa.id }} &nbsp;&nbsp;&nbsp; Data da Coleta:
              {{ bolsa.dataColeta }} &nbsp;&nbsp;&nbsp; Doador:
              {{ bolsa.doadorNome }}
            </div>
            <div class="acoes">
              <button
                class="btn-acao"
                (click)="validarBolsa(bolsa.id)"
                *ngIf="ehMedico"
              >
                Realizar Validação
              </button>
              <span *ngIf="!ehMedico">Aguardando validação médica</span>
            </div>
          </div>
        }
        <div *ngIf="bolsas.length === 0">
          Nenhuma bolsa aguardando validacao.
        </div>
      </div>
    </div>
  </div>
</div>
