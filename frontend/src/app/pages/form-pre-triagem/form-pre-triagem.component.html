<div class="form-pre-triagem">
  <div class="container">
    <h2 class="titulo">Pré-triagem</h2>

    <form class="formulario" (ngSubmit)="salvarEAvancarTriagem()">
      <div class="layout-duplo">
        <div class="grupo-inputs">
          <div class="campo">
            <label>Altura(m):</label>
            <input type="number" step="0.01" name="altura" [(ngModel)]="form.altura" placeholder="Ex: 1.75" />
          </div>

          <div class="campo">
            <label>Peso(kg):</label>
            <input type="number" step="0.1" name="peso" [(ngModel)]="form.peso" placeholder="Ex: 89.2" />
          </div>

          <div class="campo">
            <label>Teste de Hemoglobina:</label>
            <input type="number" step="0.1" name="hemoglobina" [(ngModel)]="form.hemoglobina" />
          </div>
        </div>

        <div class="coluna-info">
          <div class="card-doador">
            <div class="info-texto">
              <p>Nome: {{ doador.nome }}</p>
              <p>Sexo: {{ doador.sexo }}</p>
              <p>CPF: {{ doador.cpf }}</p>
            </div>
          </div>
        </div>
      </div>

      <div class="acoes">
        <button type="button" class="btn-cancelar" (click)="marcarInapto()">Inapto</button>
        <button type="submit" class="btn-concluir">Apto</button>
      </div>
    </form>
  </div>
</div>
