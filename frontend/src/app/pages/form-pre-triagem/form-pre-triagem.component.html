<div class="form-pre-triagem">
  <div class="container">
    <button class="btn-icone" (click)="voltar()">
      <svg
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>
    <h2 class="titulo">Pré-triagem</h2>

    <form class="formulario" #formPre="ngForm" (ngSubmit)="abrirModal('apto')">
      <div class="layout-duplo">
        <div class="grupo-inputs">
          <div class="campo">
            <label>Altura(m):</label>
            <input
              type="number"
              step="0.01"
              name="altura"
              #alt="ngModel"
              [(ngModel)]="form.altura"
              placeholder="Ex: 1.75"
              required
            />
            <small class="msg-erro" *ngIf="alt.invalid && alt.touched">
              Altura é obrigatória.
            </small>
          </div>

          <div class="campo">
            <label>Peso(kg):</label>
            <input
              type="number"
              step="0.1"
              name="peso"
              #ps="ngModel"
              [(ngModel)]="form.peso"
              placeholder="Ex: 89.2"
              required
            />
            <small class="msg-erro" *ngIf="ps.invalid && ps.touched">
              Peso é obrigatório.
            </small>
          </div>

          <div class="campo">
            <label>Teste de Hemoglobina:</label>
            <input
              type="number"
              step="0.1"
              #hemo="ngModel"
              name="hemoglobina"
              [(ngModel)]="form.hemoglobina"
              required
            />
            <small class="msg-erro" *ngIf="hemo.invalid && hemo.touched">
              Hemoglobina é obrigatória.
            </small>
          </div>
        </div>

        <div class="coluna-info">
          <div class="card-doador">
            <div class="info-texto">
              <p>Nome: {{ doador.nome }}</p>
              <p>Sexo: {{ doador.sexo }}</p>
              <p>CPF: {{ doador.cpf }}</p>
            </div>
          </div>
        </div>
      </div>

      <div class="acoes">
        <button
          type="button"
          class="btn-cancelar"
          (click)="abrirModal('inapto')"
        >
          Inapto
        </button>
        <button
          type="submit"
          class="btn-concluir"
          [disabled]="formPre.invalid"
          [disabled]="formPre.invalid"
        >
          Apto
        </button>
      </div>
    </form>
  </div>
</div>

<app-modal-confirmacao
  [visivel]="modalVisivel"
  [titulo]="modalConfig.titulo"
  [mensagem]="modalConfig.mensagem"
  [tipo]="modalConfig.tipo"
  [textoConfirmar]="modalConfig.textoConfirmar"
  (confirmado)="confirmarAcaoModal()"
  (cancelado)="fecharModal()"
>
</app-modal-confirmacao>

<app-toast-notificacao #toast></app-toast-notificacao>
