<div class="form-triagem">
  <div class="container">
    <button class="btn-icone" (click)="voltar()">
      <svg
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>
    <h2 class="titulo">Triagem Médica</h2>

    <form class="formulario" #formTri="ngForm" (ngSubmit)="abrirModal(true)">
      <div class="linha">
        <div class="campo grande">
          <label>Nome Completo:</label>
          <input type="text" [value]="doador.nome" disabled />
        </div>
      </div>

      <div class="linha">
        <div class="campo pequeno">
          <label>Data de nascimento:</label>
          <input type="date" [value]="doador.dataNascimento" disabled />
        </div>

        <div class="campo grande">
          <label>CPF:</label>
          <input type="text" [value]="doador.cpf" disabled />
        </div>
      </div>

      <div class="linha">
        <div class="campo pequeno">
          <label>Pressão arterial:</label>
          <input
            type="text"
            name="pressao_arterial"
            [(ngModel)]="pressaoArterial"
            placeholder="Ex: 12x8"
            #pressao="ngModel"
            required
          />
          <small class="msg-erro" *ngIf="pressao.invalid && pressao.touched">
            Pressão é obrigatória.
          </small>
        </div>

        <div class="campo">
          <button
            type="button"
            class="btn-questionario"
            (click)="abrirQuestionarios()"
          >
            Revisar Questionário
          </button>
          <small *ngIf="!questionarioVinculado"
            >Este processo não possui questionário vinculado.</small
          >
        </div>
      </div>

      <div class="acoes">
        <button type="button" class="btn-cancelar" (click)="abrirModal(false)">
          Inapto
        </button>
        <button type="submit" class="btn-concluir" [disabled]="formTri.invalid">
          Apto
        </button>
      </div>
    </form>
  </div>
</div>

<app-modal-confirmacao
  [visivel]="modalVisivel"
  [titulo]="modalConfig.titulo"
  [mensagem]="modalConfig.mensagem"
  [tipo]="modalConfig.tipo"
  [textoConfirmar]="modalConfig.textoConfirmar"
  (confirmado)="confirmarAcaoModal()"
  (cancelado)="fecharModal()"
>
</app-modal-confirmacao>

<app-toast-notificacao #toast></app-toast-notificacao>
