<div class="form-triagem">
  <div class="container">
    <h2 class="titulo">Triagem Médica</h2>

    <form class="formulario" (ngSubmit)="$event.preventDefault()">
      <div class="linha">
        <div class="campo grande">
          <label>Nome Completo:</label>
          <input type="text" [value]="doador.nome" disabled />
        </div>
      </div>

      <div class="linha">
        <div class="campo pequeno">
          <label>Data de nascimento:</label>
          <input type="date" [value]="doador.dataNascimento" disabled />
        </div>

        <div class="campo grande">
          <label>CPF:</label>
          <input type="text" [value]="doador.cpf" disabled />
        </div>
      </div>

      <div class="linha">
        <div class="campo pequeno">
          <label>Pressão arterial:</label>
          <input type="text" name="pressao_arterial" [(ngModel)]="pressaoArterial" placeholder="Ex: 12x8" />
        </div>

        <div class="campo">
          <button type="button" class="btn-questionario" (click)="abrirQuestionarios()">
            Revisar Questionário
          </button>
          <small *ngIf="!questionarioVinculado">Este processo não possui questionário vinculado.</small>
        </div>
      </div>

      <div class="acoes">
        <button type="button" class="btn-cancelar" (click)="reprovar()">Inapto</button>
        <button type="button" class="btn-concluir" (click)="aprovar()">Apto</button>
      </div>
    </form>
  </div>
</div>
