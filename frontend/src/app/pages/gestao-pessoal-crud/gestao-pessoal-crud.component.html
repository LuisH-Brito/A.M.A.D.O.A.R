<div class="pagina">
  <button class="seta" (click)="voltar()">
    <svg
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
  </button>
  <div class="centralizando">
    <h2>Gestão de Pessoal</h2>
    <div class="topo">
      <div class="campo-busca">
        <label>Buscar</label>
        <input type="text" placeholder="Nome/cpf" [(ngModel)]="busca" />
      </div>

      <div class="campo-filtro">
        <label>Filtro</label>
        <select [(ngModel)]="filtroSelecionado">
          <option value="Todos">Todos</option>
          <option value="Médico">Médico</option>
          <option value="Enfermeiro">Enfermeiro</option>
          <option value="Recepcionista">Recepcionista</option>
        </select>
      </div>
    </div>

    <div class="lista-container">
      <div class="lista-scroll">
        <div class="usuario-card" *ngFor="let usuario of usuariosPaginados">
          <div class="info">
            Nome: {{ usuario.nome }} Cargo: {{ usuario.cargo }}
          </div>

          <div class="acoes">
            <button
              class="btn-acao btn-visualizar"
              (click)="navegarComDados(usuario, true)"
            >
              <i class="bi bi-eye"></i>
            </button>

            <button
              class="btn-acao btn-editar"
              (click)="navegarComDados(usuario, false)"
            >
              <i class="bi bi-pencil"></i>
            </button>

            <button
              class="btn-acao btn-excluir"
              (click)="excluir(usuario.id, usuario.cargo)"
            >
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <app-paginacao
      [paginaAtual]="paginaAtual"
      [totalItens]="usuariosFiltrados.length"
      [itensPorPagina]="itensPorPagina"
      (mudancaPagina)="mudarPagina($event)"
    >
    </app-paginacao>
  </div>
</div>
