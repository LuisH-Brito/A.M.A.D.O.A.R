<main>
  <div *ngIf="mensagemSucesso" class="alert-success">
    {{ mensagemSucesso }}
  </div>
  <div class="login-container">
    <div class="login-left">
      <img src="images/logo-hemoacre.png" alt="HEMO ACRE" class="logo" />
      <h2>Comece a salvar vidas agora.</h2>
      <a routerLink="/cadastro" class="btn-cadastro"> Cadastre-se </a>
    </div>

    <div class="login-right">
      <h2>Login</h2>
      <form (ngSubmit)="fazerLogin()">
        <div class="form-group">
          <label for="cpf">CPF</label>
          <input
            type="text"
            id="cpf"
            name="username"
            [(ngModel)]="loginData.cpf"
            placeholder="Digite seu CPF"
            required
          />
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>

          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="senha"
              name="password"
              [(ngModel)]="loginData.password"
              placeholder="Digite sua senha"
              required
            />

            <button
              type="button"
              class="btn-toggle-password"
              (click)="togglePassword()"
              aria-label="Mostrar ou ocultar senha"
            >
              <i class="bi" [ngClass]="showPassword ? 'bi-eye' : 'bi-eye-slash'"></i>
            </button>
          </div>
        </div>

        <a routerLink="/redefinir-senha" href="#" class="forgot-link">Esqueceu sua senha?</a>

        <button type="submit" class="btn-login">Entrar</button>
      </form>
    </div>
  </div>
</main>
